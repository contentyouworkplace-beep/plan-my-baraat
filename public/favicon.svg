<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Royal Red/Burgundy Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#9C1E31" />
      <stop offset="70%" stop-color="#7C1C2B" />
      <stop offset="100%" stop-color="#4F0E17" />
    </radialGradient>

    <!-- Premium Royal Gold Gradient for Border and Text -->
    <linearGradient id="royalGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B45309" />
      <stop offset="30%" stop-color="#F59E0B" />
      <stop offset="70%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Soft Drop Shadow for Depth -->
    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background Circle with Royal Red Gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" />

  <!-- Dotted Inner Gold Ring -->
  <circle cx="256" cy="256" r="222" fill="none" stroke="url(#royalGold)" stroke-width="4" stroke-dasharray="10 8" />

  <!-- Solid Thin Gold Ring -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="url(#royalGold)" stroke-width="2" />

  <!-- "PMB" Text in the Center -->
  <text x="256" y="295" 
        font-family="'Cinzel', 'Georgia', 'Times New Roman', serif" 
        font-size="145" 
        font-weight="900" 
        fill="url(#royalGold)" 
        text-anchor="middle" 
        letter-spacing="2"
        filter="url(#subtleShadow)">PMB</text>

  <!-- Royal Tassel / Sparkle Motif at the top center -->
  <g transform="translate(256, 115) scale(0.65)" filter="url(#subtleShadow)">
    <!-- Small star/sparkle -->
    <path d="M 0,-30 C 0,-10 10,0 30,0 C 10,0 0,10 0,30 C 0,10 -10,0 -30,0 C -10,0 0,-10 0,-30 Z" fill="url(#royalGold)" />
  </g>

  <!-- Decorative small dots at the bottom -->
  <circle cx="256" cy="355" r="5" fill="url(#royalGold)" />
  <circle cx="230" cy="350" r="4" fill="url(#royalGold)" opacity="0.8" />
  <circle cx="282" cy="350" r="4" fill="url(#royalGold)" opacity="0.8" />
</svg>
