<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Royal Gold Gradient for Sparkles -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="30%" stop-color="#FFB300" />
      <stop offset="70%" stop-color="#FF8F00" />
      <stop offset="100%" stop-color="#FF6F00" />
    </linearGradient>
    <!-- Premium Gold Gradient for Elephant and Accents -->
    <linearGradient id="royalGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B45309" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1C1917" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background: Elegant Dark Charcoal Circle for high contrast and modern luxury vibe -->
  <circle cx="256" cy="256" r="240" fill="#1C1917" />
  
  <!-- Traditional Indian Inspired Decorative Rings -->
  <circle cx="256" cy="256" r="225" fill="none" stroke="url(#royalGold)" stroke-width="6" stroke-dasharray="12, 6" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#royalGold)" stroke-width="2" />
  
  <!-- Royal Procession Motifs -->
  <g filter="url(#subtleShadow)">
    <!-- Royal Canopy (Chhatri) on Elephant's Back -->
    <path d="M 256,120 C 230,120 200,140 200,165 L 312,165 C 312,140 282,120 256,120 Z" fill="url(#royalGold)" />
    <path d="M 256,110 L 256,120" stroke="url(#royalGold)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Hanging pearls/bead decorations under Chhatri -->
    <circle cx="206" cy="172" r="3.5" fill="#FFE082" />
    <circle cx="226" cy="172" r="3.5" fill="#FFE082" />
    <circle cx="246" cy="172" r="3.5" fill="#FFE082" />
    <circle cx="266" cy="172" r="3.5" fill="#FFE082" />
    <circle cx="286" cy="172" r="3.5" fill="#FFE082" />
    <circle cx="306" cy="172" r="3.5" fill="#FFE082" />
    
    <!-- Support pole -->
    <line x1="256" y1="165" x2="256" y2="240" stroke="url(#royalGold)" stroke-width="4" />

    <!-- Elephant Silhouette -->
    <path d="M 330,240 
             C 320,225 295,220 270,225
             C 255,228 230,232 215,240
             C 195,250 180,270 180,295
             C 180,315 190,335 195,350
             L 195,390
             C 195,395 200,400 205,400
             C 210,400 215,395 215,390
             L 215,355
             L 245,355
             L 245,390
             C 245,395 250,400 255,400
             C 260,400 265,395 265,390
             L 265,345
             C 280,345 290,345 305,345
             L 305,390
             C 305,395 310,400 315,400
             C 320,400 325,395 325,390
             L 325,350
             L 345,350
             L 345,390
             C 345,395 350,400 355,400
             C 360,400 365,395 365,390
             L 365,320
             C 375,310 380,290 380,275
             C 380,250 365,245 355,250
             C 350,252 342,255 330,240 Z" 
          fill="url(#royalGold)" />
          
    <!-- Trunk (curled up dynamically in celebration) -->
    <path d="M 360,265
             C 375,268 395,265 405,250
             C 415,235 410,210 395,200
             C 385,192 370,195 365,205
             C 360,215 365,225 375,225
             C 382,225 388,220 388,212
             C 388,208 382,205 375,208" 
          fill="none" stroke="url(#royalGold)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Royal Saddle (Jhool) with details -->
    <path d="M 235,244 
             C 255,240 285,240 305,244
             L 300,285
             C 285,295 255,295 240,285
             Z" fill="#BE123C" stroke="#FFE082" stroke-width="2" />
             
    <!-- Tusk -->
    <path d="M 370,272 C 375,274 382,274 385,270 C 382,267 375,267 370,272 Z" fill="#FFFFFF" />

    <!-- Royal Feathers / Kalgi on Elephant head -->
    <path d="M 345,235 C 348,220 345,210 340,205 C 350,210 352,220 350,235 Z" fill="#FFE082" />
    <path d="M 350,235 C 355,222 355,212 350,205 C 358,212 358,222 352,235 Z" fill="#FFE082" />

    <!-- Sparkles (celebration elements) surrounding the Elephant -->
    <!-- Large spark above trunk -->
    <g transform="translate(405, 160) scale(0.9)">
      <path d="M 0,-30 C 0,-10 10,0 30,0 C 10,0 0,10 0,30 C 0,10 -10,0 -30,0 C -10,0 0,-10 0,-30 Z" fill="url(#goldGrad)" />
    </g>
    <!-- Medium spark near tail -->
    <g transform="translate(145, 260) scale(0.6)">
      <path d="M 0,-30 C 0,-10 10,0 30,0 C 10,0 0,10 0,30 C 0,10 -10,0 -30,0 C -10,0 0,-10 0,-30 Z" fill="url(#goldGrad)" />
    </g>
    <!-- Small spark top-left -->
    <g transform="translate(200, 110) scale(0.4)">
      <path d="M 0,-30 C 0,-10 10,0 30,0 C 10,0 0,10 0,30 C 0,10 -10,0 -30,0 C -10,0 0,-10 0,-30 Z" fill="url(#goldGrad)" />
    </g>
  </g>
</svg>
